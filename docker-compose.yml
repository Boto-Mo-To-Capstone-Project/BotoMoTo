services:
  db:
    image: postgres:16-alpine
    container_name: botomoto-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: botomoto
      POSTGRES_USER: botomoto
      POSTGRES_PASSWORD: botomoto
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botomoto -d botomoto"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botomoto-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3004:3000"
    command: sh -c "npx prisma migrate deploy && node scripts/create-superadmin.mjs && npm run start"

volumes:
  postgres_data:
